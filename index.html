<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Analytics Test Site</title>

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-JWDSS3T4QV"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XXXXXXX');
    </script>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f7fa;
        }

        header {
            background: #1e3a8a;
            color: white;
            padding: 20px;
            text-align: center;
        }

        nav {
            background: #2563eb;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }

        section {
            padding: 40px;
            text-align: center;
        }

        .card {
            background: white;
            padding: 20px;
            margin: 20px auto;
            width: 80%;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        footer {
            background: #1e3a8a;
            color: white;
            text-align: center;
            padding: 15px;
        }

        button {
            padding: 10px 20px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #1e40af;
        }
    </style>
</head>

<body>

<header>
    <h1>My Analytics Test Website</h1>
    <p>Tracking user behavior using Google Analytics</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
</nav>

<section>
    <div class="card">
        <h2>Welcome 👋</h2>
        <p>This is a demo website to test Google Analytics tracking.</p>
        <button onclick="trackClick()">Click Me</button>
    </div>

    <div class="card">
        <h2>About This Project</h2>
        <p>This site is hosted on Vercel and used for learning analytics.</p>
    </div>
</section>

<footer>
    <p>© 2026 My Test Site</p>
</footer>

<script>
function trackClick() {
    alert("Button Clicked!");

    gtag('event', 'button_click', {
        event_category: 'engagement',
        event_label: 'test_button'
    });
}
</script>

</body>
</html>
